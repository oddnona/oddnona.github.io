<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illustrator & Graphic Design | Nona Bulubasa</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="./design.css"></head>
<body>

<header class="design-header">
    <h1>Illustrator & Graphic Design Experience</h1>
</header>

<nav class="page-nav">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="thesis.html">3D Film</a>
    <a href="games-web.html">Projects</a>
</nav>

<main>

    <section class="section design-intro">
        <p>
            I was commissioned to make illustrations and logos for clients and organizations.
            Select a journal from the shelf below to browse the work.
        </p>
    </section>

    <section class="design-commissions" id="designCommissions">
    <div class="bookshelf-frame" id="bookshelfFrame">
        <img class="bookshelf-image" src="books.png" alt="" aria-hidden="true">

        <div class="journal-shelf" id="journalShelf">
            <!-- JS will create the three books here -->
        </div>
    </div>

    <div class="journal-stage" id="journalStage" aria-hidden="true">
            <div class="journal-widget" id="journalWidget" role="dialog" aria-modal="false">
                <button class="journal-close" id="journalClose" type="button" aria-label="Close journal">
                    ×
                </button>

                <div class="journal-title-bar">
                    <h3 id="journalTitle">Journal Title</h3>
                </div>

                <div class="spread-carousel" id="spreadCarousel">
                    <!-- JS will create the pages here -->
                </div>
                <p class="journal-instructions">
                    Scroll • Swipe • ← →
                </p>
            </div>
        </div>
    </section>

</main>

<script src="design.js"></script>
</body>
</html>
